<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Danh sách sách</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        h1 {
            text-align: center;
        }

        .add-btn {
            display: inline-block;
            margin-bottom: 15px;
            padding: 8px 14px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        th {
            background: #2196F3;
            color: white;
        }

        tr:nth-child(even) {
            background: #f2f2f2;
        }

        .action a {
            margin: 0 5px;
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 4px;
            color: white;
        }

        .edit {
            background: #ff9800;
        }

        .delete {
            background: #f44336;
        }
    </style>
</head>
<body>

<h1>📚 Danh sách sách</h1>

<a href="/books/add" class="add-btn">➕ Thêm sách mới</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Tiêu đề</th>
        <th>Tác giả</th>
        <th>Hành động</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.id}"></td>
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td class="action">
            <a th:href="@{/books/edit/{id}(id=${book.id})}" class="edit">Sửa</a>
            <a th:href="@{/books/delete/{id}(id=${book.id})}"
               class="delete"
               onclick="return confirm('Bạn có chắc muốn xóa?')">
                Xóa
            </a>
        </td>
    </tr>
    </tbody>
</table>

</body>
</html>
